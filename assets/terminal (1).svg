.L16 { opacity:0; animation: fadein 0.01s 5.9s forwards; }
.L17 { opacity:0; animation: fadein 0.01s 6.3s forwards; }
.L18 { opacity:0; animation: fadein 0.01s 6.7s forwards; }
.L19 { opacity:0; animation: fadein 0.01s 7.1s forwards; }
.L20 { opacity:0; animation: fadein 0.01s 7.5s forwards; }
.L21 { opacity:0; animation: fadein 0.01s 7.9s forwards; }
.L22 { opacity:0; animation: fadein 0.01s 8.3s forwards; }

@keyframes fadein { to { opacity: 1; } }

.cursor { opacity: 0; animation: fadein 0.01s 8.6s forwards; }
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
.blink { animation: fadein 0.01s 8.6s forwards, blink 1s 8.6s step-end infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.glow { animation: pulse 3s ease-in-out infinite; }
</style>

