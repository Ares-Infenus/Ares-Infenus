.L3  { opacity:0; animation: fadein 0.01s 0.8s forwards; }
.L4  { opacity:0; animation: fadein 0.01s 1.1s forwards; }
.L5  { opacity:0; animation: fadein 0.01s 1.5s forwards; }
.L6  { opacity:0; animation: fadein 0.01s 1.9s forwards; }
.L7  { opacity:0; animation: fadein 0.01s 2.3s forwards; }
.L8  { opacity:0; animation: fadein 0.01s 2.7s forwards; }
.L9  { opacity:0; animation: fadein 0.01s 3.1s forwards; }
.L10 { opacity:0; animation: fadein 0.01s 3.5s forwards; }
.L11 { opacity:0; animation: fadein 0.01s 3.9s forwards; }
.L12 { opacity:0; animation: fadein 0.01s 4.3s forwards; }
.L13 { opacity:0; animation: fadein 0.01s 4.7s forwards; }
