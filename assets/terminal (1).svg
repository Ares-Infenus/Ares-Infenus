<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
.mono { font-family: 'Share Tech Mono', monospace; font-size: 13px; fill: #00ffcc; }
.mono-dim { font-family: 'Share Tech Mono', monospace; font-size: 13px; fill: #00aa88; }
.mono-head { font-family: 'Share Tech Mono', monospace; font-size: 13px; fill: #00ffcc; font-weight: bold; }
.border { fill: none; stroke: #00ffcc; stroke-width: 1; }
.border-dim { fill: none; stroke: #004433; stroke-width: 0.5; }
.scanline { fill: none; stroke: #00ffcc; stroke-width: 0.3; opacity: 0.04; }

.L1  { opacity:0; animation: fadein 0.01s 0.2s forwards; }
